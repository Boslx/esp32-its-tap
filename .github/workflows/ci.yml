name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# ---------------------------------------------------------------------------
# Firmware — PlatformIO (ESP32-C5)
# ---------------------------------------------------------------------------
jobs:
  firmware:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            firmware/.pio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/.pio/build/main/firmware.factory.bin
          if-no-files-found: error

# ---------------------------------------------------------------------------
# Rust — Cargo (tap bridge)
# ---------------------------------------------------------------------------
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: its-g5-tap-bridge
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: its-g5-tap-bridge

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build (all targets, including tests)
        run: cargo build --all-targets

      - name: Build release binary
        run: cargo build --release

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: its-g5-tap-bridge
          path: its-g5-tap-bridge/target/release/its-g5-tap
          if-no-files-found: error

      - name: Run tests
        run: cargo test

# ---------------------------------------------------------------------------
# Python — uv (test client)
# ---------------------------------------------------------------------------
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: testing
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: testing/uv.lock

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uvx ruff format --check

      - name: Lint
        run: uvx ruff check

      - name: Check importability
        run: uv run python -c "from client import interface_pb2; print('Protobuf OK')"
