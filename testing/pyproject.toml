[project]
name = "cits-client"
version = "0.1.0"
description = "Python client for ESP32-C5 ITS-G5 / 802.11p protobuf serial interface"
requires-python = ">=3.10"
dependencies = [
    "pyserial>=3.5",
    "scapy>=2.5",
    "protobuf>=4.25",
    "scapy-etsi-its",
]

[project.scripts]
cits-client = "client:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/client"]

[tool.ruff]
# Skip the auto-generated protobuf file — its _NAME variables are valid
# at runtime through protobuf's descriptor magic.
exclude = ["src/client/interface_pb2.py"]

[tool.uv.sources]
scapy-etsi-its = { git = "https://github.com/Boslx/v2x-scapy.git" }
